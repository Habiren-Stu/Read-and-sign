<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑班系統</title>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.button-row { display:flex; gap:10px; justify-content:center; margin:20px; }
.btn { flex:1; max-width:200px; padding:15px; color:white; border:none; border-radius:10px; font-size:calc(12px + 0.8vw); }
.mail { background:#4CAF50; }
.sign { background:#2196F3; }
.check { background:#f44336; }

.table-container { max-height:400px; overflow-y:auto; }
table { width:90%; margin:auto; border-collapse:collapse; background:white; }
th,td { padding:10px; border:1px solid #ccc; }
th { position:sticky; top:0; background:#eee; }
</style>
</head>

<body>

<h1>XX學校跑班系統</h1>

<div class="button-row">
  <button class="btn mail" onclick="generateQR()">發出點名信</button>
  <button class="btn sign" onclick="openScanner()">學生簽到系統</button>
  <button class="btn check" onclick="checkAttendance()">查詢出缺席</button>
</div>

<div id="qrcode"></div>

<div class="table-container">
<table id="table">
<thead>
<tr>
  <th>選</th><th>姓名</th><th>學號</th><th>課程</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// 🔐 登入驗證
async function checkUser() {
  const email = prompt("輸入Email");
  const users = await fetch("user.json").then(r=>r.json());
  if (!users.find(u=>u.email===email)) {
    document.body.innerHTML="❌ 無權限";
  }
}
checkUser();

let data = [];

// 📄 載入資料
fetch("課程資料.json")
.then(res=>res.json())
.then(d=>{
  data=d;
  const tbody=document.querySelector("#table tbody");

  d.forEach(row=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><input type="checkbox" data-id="${row.學號}" onchange="onlyOne(this)"></td>
      <td>${row.姓名}</td>
      <td>${row.學號}</td>
      <td>${row.課程名稱}</td>
    `;
    tbody.appendChild(tr);
  });
});

// ✔ 同學只能選一課
function onlyOne(cb){
  const id=cb.dataset.id;
  document.querySelectorAll(`input[data-id='${id}']`)
    .forEach(x=>{ if(x!==cb) x.checked=false; });
}

// 📧 產生QR
function generateQR(){
  const selected=getSelected();
  const div=document.getElementById("qrcode");
  div.innerHTML="";

  selected.forEach(s=>{
    const text=`${s.id}_${s.name}_${new Date().toLocaleDateString()}`;

    const box=document.createElement("div");
    new QRCode(box,{text:text,width:120,height:120});

    div.appendChild(document.createTextNode(s.name));
    div.appendChild(box);
  });
}

// 📷 開掃描
function openScanner(){
  localStorage.setItem("selected",JSON.stringify(getSelected()));
  window.location.href="scanner.html";
}

// 📊 查詢
function checkAttendance(){
  const r=JSON.parse(localStorage.getItem("records"))||[];
  console.log(r);
  alert("查看 console");
}

// 共用
function getSelected(){
  const arr=[];
  document.querySelectorAll("input:checked").forEach(cb=>{
    const row=cb.closest("tr").children;
    arr.push({
      id:row[2].innerText,
      name:row[1].innerText
    });
  });
  return arr;
}
</script>

</body>
</html>

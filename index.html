<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑班系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: Arial; text-align: center; background: #f5f5f5; }
  h1 { margin: 20px; }

  /* 按鈕與上傳區塊 */
  .control-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    margin: 0 auto 20px auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .file-input-wrapper { 
    text-align: left; 
    background: #eef2f3;
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px dashed #bbb;
    width: 100%;
    max-width: 400px;
  }
  input[type="file"] { margin-top: 10px; display: block; font-size: 16px; }

  .button-row { display: flex; justify-content: center; gap: 10px; width: 100%; margin-top: 10px;}
  
  .btn {
    flex: 1;
    max-width: 200px;
    padding: 15px;
    font-size: calc(12px + 0.8vw);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }
  .mail { background: #4CAF50; }
  .sign { background: #2196F3; }
  
  /* 表格 */
  .table-container {
    max-height: 500px;
    overflow-y: auto;
    width: 95%;
    margin: auto;
    background: white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
  th { background: #333; color: white; position: sticky; top: 0; }
  
  /* 勾選框放大一點比較好按 */
  input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
</style>
</head>

<body>

<h1>跑班系統</h1>

<div class="control-panel">
  <div class="file-input-wrapper">
    <label for="excelUpload"><strong>📊 匯入「課程資料」(支援 Excel / CSV):</strong></label>
    <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" />
  </div>

  <div class="button-row">
    <button class="btn mail" onclick="sendMail()">📧 確認 USER 名單</button>
    <button class="btn sign" onclick="openScanner()">📷 開啟掃描頁</button>
  </div>
</div>

<div class="table-container">
  <table id="table">
    <thead>
      <tr>
        <th>選取</th>
        <th>編號</th>
        <th>班級</th>
        <th>座號</th>
        <th>學號</th>
        <th>姓名</th>
        <th>課程名稱</th>
        <th>科目</th>
        <th>上課教室</th>
        <th>教師</th>
        <th>EMAIL</th> </tr>
    </thead>
    <tbody>
      </tbody>
  </table>
</div>

<script>
let courseData = []; // 存放匯入的課程資料

// ==========================================
// 1. 監聽 Excel / CSV 檔案上傳
// ==========================================
document.getElementById('excelUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    // 使用 SheetJS 讀取檔案 (支援 XLSX 與 CSV)
    const workbook = XLSX.read(data, { type: 'array' });
    
    // 取得第一個工作表
    const firstSheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheetName];
    
    // 將檔案轉換為 JSON 陣列供網頁使用
    courseData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
    console.log("成功匯入課程資料:", courseData);
    
    // 將資料印到表格上
    renderTable(courseData);
  };
  reader.readAsArrayBuffer(file);
});

// ==========================================
// 2. 渲染表格
// ==========================================
function renderTable(data) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = ""; // 清空現有資料

  data.forEach(row => {
    // 防呆：略過沒有學號或編號的空白列
    if (!row["編號"] && !row["學號"]) return; 

    const tr = document.createElement("tr");

    // 相容可能的大小寫差異：抓取 EMAIL、Email 或 email 欄位
    const email = row["EMAIL"] || row["Email"] || row["email"] || "";

    tr.innerHTML = `
      <td><input type="checkbox" data-id="${row.學號}" data-course="${row.課程名稱}" onchange="handleCheck(this)"></td>
      <td>${row.編號 || ""}</td>
      <td>${row.班級 || ""}</td>
      <td>${row.座號 || ""}</td>
      <td>${row.學號 || ""}</td>
      <td>${row.姓名 || ""}</td>
      <td>${row.課程名稱 || ""}</td>
      <td>${row.科目 || ""}</td>
      <td>${row.上課教室 || ""}</td>
      <td>${row.教師 || ""}</td>
      <td>${email}</td> `;
    tbody.appendChild(tr);
  });
}

// ==========================================
// 3. 核取方塊邏輯：同一學號只能選擇一堂課
// ==========================================
function handleCheck(cb) {
  if (!cb.checked) return; // 取消勾選不處理
  
  const studentId = cb.dataset.id;

  // 找出網頁上所有該學號的 Checkbox
  const checkboxes = document.querySelectorAll(`input[data-id='${studentId}']`);
  
  checkboxes.forEach(x => {
    if (x !== cb) {
      x.checked = false; // 強制取消其他同課程的勾選
    }
  });
}

// ==========================================
// 4. 獲取已選取的「USER (點名名單)」
// ==========================================
function getSelected() {
  const selectedRows = [];
  const checkedBoxes = document.querySelectorAll("input[type='checkbox']:checked");
  
  checkedBoxes.forEach(cb => {
    const tr = cb.closest("tr");
    // 將選中的學生資料打包成 USER 名單，包含 EMAIL
    selectedRows.push({
      學號: cb.dataset.id,
      編號: tr.cells[1].innerText,
      姓名: tr.cells[5].innerText,
      課程名稱: tr.cells[6].innerText,
      EMAIL: tr.cells[10].innerText // 擷取第10個儲存格的 EMAIL 資訊
    });
  });
  return selectedRows;
}

// 📧 確認並儲存名單
function sendMail() {
  const selected = getSelected();
  if(selected.length === 0) {
    alert("請先在表格中勾選要點名的學生！");
    return;
  }
  
  // 將選取結果存入 localStorage 供 scanner.html 讀取
  localStorage.setItem("selectedStudents", JSON.stringify(selected));
  console.log("已產生的 USER 名單 (含 EMAIL)：", selected);
  alert("✅ 已確認 " + selected.length + " 人的點名名單 (USER)！您可以前往掃描頁了。");
}

// 📷 開啟掃描頁
function openScanner() {
  const selected = getSelected();
  // 即使沒點擊上面按鈕，前往掃描前也幫他自動儲存一次
  localStorage.setItem("selectedStudents", JSON.stringify(selected));
  window.location.href = "scanner.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑班系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: Arial; text-align: center; background: #f5f5f5; }
  h1 { margin: 20px; }

  /* 按鈕與上傳區塊 */
  .control-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    margin: 0 auto 20px auto;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .upload-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  .file-input-wrapper { 
    text-align: left; 
    background: #eef2f3;
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px dashed #bbb;
  }
  input[type="file"] { margin-top: 8px; display: block; }

  .button-row { display: flex; justify-content: center; gap: 10px; width: 100%; margin-top: 10px;}
  
  .btn {
    flex: 1;
    max-width: 200px;
    padding: 15px;
    font-size: calc(12px + 0.8vw);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }
  .mail { background: #4CAF50; }
  .sign { background: #2196F3; }
  
  /* 表格 */
  .table-container {
    max-height: 500px;
    overflow-y: auto;
    width: 95%;
    margin: auto;
    background: white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
  th { background: #333; color: white; position: sticky; top: 0; }
</style>
</head>

<body>

<h1>跑班系統</h1>

<div class="control-panel">
  <div class="upload-row">
    <div class="file-input-wrapper">
      <label for="jsonUpload"><strong>📄 1. 匯入「名單」(user.json):</strong></label>
      <input type="file" id="jsonUpload" accept=".json" />
    </div>

    <div class="file-input-wrapper">
      <label for="excelUpload"><strong>📊 2. 匯入「課程資料」(Excel):</strong></label>
      <input type="file" id="excelUpload" accept=".xlsx, .xls" />
    </div>
  </div>

  <div class="button-row">
    <button class="btn mail" onclick="sendMail()">📧 發送點名信</button>
    <button class="btn sign" onclick="openScanner()">📷 開啟掃描頁</button>
  </div>
</div>

<div class="table-container">
  <table id="table">
    <thead>
      <tr>
        <th>選取</th>
        <th>編號</th>
        <th>班級</th>
        <th>座號</th>
        <th>學號</th>
        <th>姓名</th>
        <th>課程名稱</th>
        <th>科目</th>
        <th>上課教室</th>
        <th>教師</th>
      </tr>
    </thead>
    <tbody>
      </tbody>
  </table>
</div>

<script>
let userData = []; // 存放 JSON user 資料
let courseData = []; // 存放 Excel 匯入的課程資料

// ==========================================
// 1. 監聽 JSON 檔案上傳 (解決 fetch 被瀏覽器阻擋的問題)
// ==========================================
document.getElementById('jsonUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      userData = JSON.parse(e.target.result);
      console.log("已成功載入 USER 資料:", userData);
      alert("✅ 成功讀取 user.json！共載入 " + userData.length + " 筆資料。");
    } catch (err) {
      alert("❌ 讀取失敗，請確認檔案是否為正確的 JSON 格式。");
      console.error(err);
    }
  };
  reader.readAsText(file);
});

// ==========================================
// 2. 監聽 Excel 檔案上傳 (課程資料)
// ==========================================
document.getElementById('excelUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    // 使用 SheetJS 讀取 Excel
    const workbook = XLSX.read(data, { type: 'array' });
    
    // 假設資料在第一個工作表
    const firstSheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheetName];
    
    // 將 Excel 轉換為 JSON 陣列 (第一行為標題)
    courseData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
    console.log("成功匯入課程資料:", courseData);
    
    // 渲染表格
    renderTable(courseData);
  };
  reader.readAsArrayBuffer(file);
});

// 3. 渲染表格
function renderTable(data) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = ""; // 清空現有資料

  data.forEach(row => {
    // 略過空白的無效列 (如 Excel 中常有的空行)
    if (!row["編號"] && !row["學號"]) return; 

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input type="checkbox" data-id="${row.學號}" data-course="${row.課程名稱}" onchange="handleCheck(this)"></td>
      <td>${row.編號 || ""}</td>
      <td>${row.班級 || ""}</td>
      <td>${row.座號 || ""}</td>
      <td>${row.學號 || ""}</td>
      <td>${row.姓名 || ""}</td>
      <td>${row.課程名稱 || ""}</td>
      <td>${row.科目 || ""}</td>
      <td>${row.上課教室 || ""}</td>
      <td>${row.教師 || ""}</td>
    `;
    tbody.appendChild(tr);
  });
}

// 4. ✔ 核取方塊邏輯：如果該學號(同一人)有多個課程名稱，只能選擇一個
function handleCheck(cb) {
  if (!cb.checked) return; // 如果是取消勾選則不處理
  
  const studentId = cb.dataset.id;

  // 找出所有此學號的 Checkbox
  const checkboxes = document.querySelectorAll(`input[data-id='${studentId}']`);
  
  checkboxes.forEach(x => {
    if (x !== cb) {
      x.checked = false; // 強制取消其他同課程的勾選
    }
  });
}

// 5. 獲取已選取的名單
function getSelected() {
  const selectedRows = [];
  const checkedBoxes = document.querySelectorAll("input[type='checkbox']:checked");
  
  checkedBoxes.forEach(cb => {
    const tr = cb.closest("tr");
    selectedRows.push({
      學號: cb.dataset.id,
      編號: tr.cells[1].innerText,
      姓名: tr.cells[5].innerText,
      課程名稱: tr.cells[6].innerText
    });
  });
  return selectedRows;
}

// 📧 發送名單
function sendMail() {
  const selected = getSelected();
  if(selected.length === 0) {
    alert("請先選擇要點名的學生！");
    return;
  }
  
  // 將選取結果存入 localStorage
  localStorage.setItem("selectedStudents", JSON.stringify(selected));
  console.log("即將發送點名信的名單：", selected);
  alert("已確認 " + selected.length + " 人的點名名單並準備發送！");
}

// 📷 開掃描頁
function openScanner() {
  const selected = getSelected();
  localStorage.setItem("selectedStudents", JSON.stringify(selected));
  window.location.href = "scanner.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>掃描</title>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
<h2>QR 掃描</h2>
<div id="reader" style="width:300px;"></div>

<script>
let selected = JSON.parse(localStorage.getItem("selected")) || [];
let signed = {};
let data=[];

fetch("課程資料.json")
.then(r=>r.json())
.then(d=>data=d);

function saveRecord(stu){
  let r=JSON.parse(localStorage.getItem("records"))||[];
  r.push({學號:stu.學號,姓名:stu.姓名,時間:new Date().toLocaleString()});
  localStorage.setItem("records",JSON.stringify(r));
}

const scanner=new Html5Qrcode("reader");

scanner.start(
  { facingMode:"environment" },
  { fps:20, qrbox:250 },
  text=>{
    const id=text.split("_")[0];

    const stu=data.find(s=>s.學號===id);
    if(!stu){ alert("❌ 無此人"); return; }

    if(!selected.find(s=>s.id===id)){
      alert("⚠️ 未點名"); return;
    }

    if(signed[id]){
      alert("⚠️ 已簽到"); return;
    }

    signed[id]=true;
    saveRecord(stu);

    alert("✅ 簽到成功 "+stu.姓名);
  }
);
</script>
</body>
</html>
